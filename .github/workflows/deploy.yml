# Автодеплой на VPS після push у main.
# Secrets (Settings → Secrets and variables → Actions): HOST, USERNAME, SSH_PRIVATE_KEY, SSH_PORT.
# На сервері: клон репозиторію в DEPLOY_PATH, файл .env поруч із docker-compose.yml.

name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            git pull origin main
            docker compose up -d --build
            docker image prune -f
            docker builder prune -f --filter "until=72h"
